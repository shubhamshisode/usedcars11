<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Used Car Entry Form</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #000000, #0d6efd);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            border-radius: 18px;
            background: #111;
            color: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        h3 {
            color: #0d6efd;
            font-weight: 700;
        }

        .form-label {
            color: #e0e0e0;
            font-weight: 600;
        }

        .form-control,
        .form-select {
            background-color: #1c1c1c;
            border: 1px solid #444;
            color: #fff;
        }

        .form-control::placeholder {
            color: #aaa;
        }

        .form-control:focus,
        .form-select:focus {
            background-color: #1c1c1c;
            color: #fff;
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.2rem rgba(13,110,253,0.35);
        }

        .btn-primary {
            background: linear-gradient(135deg, #0d6efd, #000000);
            border: none;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #084298, #000000);
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card p-4 col-md-8 mx-auto">

        <h3 class="text-center mb-4">Used Car Information Form</h3>

        <form action="savecar" method="POST">

            <div class="mb-3">
                <label class="form-label">Brand</label>
                <select class="form-select" name="brand" required>
                    <option value="">Select Brand</option>
                    <option>Maruti Suzuki</option>
                    <option>Hyundai</option>
                    <option>Tata</option>
                    <option>Honda</option>
                    <option>Mahindra</option>
                    <option>Toyota</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Model</label>
                <input type="text" class="form-control" name="model" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Manufacturing Year</label>
                <input type="number" class="form-control" name="mfgyear" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Kilometers Driven</label>
                <input type="number" class="form-control" name="kilometers" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Fuel Type</label>
                <select class="form-select" name="fueltype" required>
                    <option value="">Select Fuel Type</option>
                    <option value="PETROL">Petrol</option>
                    <option value="DIESEL">Diesel</option>
                    <option value="CNG">CNG</option>
                    <option value="ELECTRIC">Electric</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Color</label>
                <input type="text" class="form-control" name="color" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Price</label>
                <input type="number" step="0.01" class="form-control" name="price" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Owner Name</label>
                <input type="text" class="form-control" name="ownername" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Mobile</label>
                <input type="text" class="form-control" name="mobile" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Status</label>
                <select class="form-select" name="status">
                    <option value="AVAILABLE">AVAILABLE</option>
                    <option value="SOLD">SOLD</option>
                </select>
            </div>

            <div class="text-center mt-4">
                <button type="submit" class="btn btn-primary px-5">
                    Save Car
                </button>
            </div>

        </form>
    </div>
</div>

</body>
</html>
