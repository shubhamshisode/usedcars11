<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>New Enquiry | Used Cars</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #000000, #0d6efd);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .enquiry-card {
            background: #111;
            color: #fff;
            border-radius: 22px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            animation: slideUp 0.8s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(35px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h3 {
            color: #0d6efd;
            font-weight: 700;
        }

        .form-label {
            font-weight: 600;
            color: #e0e0e0;
        }

        .form-control {
            background-color: #1c1c1c;
            border: 1px solid #444;
            color: #fff;
            border-radius: 10px;
        }

        .form-control::placeholder {
            color: #aaa;
        }

        .form-control:focus {
            background-color: #1c1c1c;
            color: #fff;
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.15rem rgba(13,110,253,0.35);
        }

        .btn-custom {
            background: linear-gradient(135deg, #0d6efd, #000000);
            border: none;
            font-weight: 600;
            border-radius: 12px;
        }

        .btn-custom:hover {
            background: linear-gradient(135deg, #084298, #000000);
        }

        .btn-outline-secondary {
            border-radius: 12px;
            border-color: #6c757d;
            color: #ccc;
        }

        .btn-outline-secondary:hover {
            background-color: #222;
            color: #fff;
        }

        .icon-title {
            background: linear-gradient(135deg, #0d6efd, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <div class="card enquiry-card p-5">

                <h3 class="text-center mb-4">
                    <i class="bi bi-chat-dots-fill icon-title"></i>
                    New Customer Enquiry
                </h3>

                <form action="saveenq" method="post">

                    <!-- Enquiry Date -->
                    <div class="mb-3">
                        <label class="form-label">Enquiry Date</label>
                        <input type="date"
                               class="form-control"
                               name="enquiryDate"
                               required>
                    </div>

                    <!-- Customer Name -->
                    <div class="mb-3">
                        <label class="form-label">Customer Name</label>
                        <input type="text"
                               class="form-control"
                               name="customerName"
                               placeholder="Enter full name"
                               required>
                    </div>

                    <!-- Mobile -->
                    <div class="mb-3">
                        <label class="form-label">Mobile Number</label>
                        <input type="text"
                               class="form-control"
                               name="mobile"
                               placeholder="10 digit mobile number"
                               pattern="[0-9]{10}"
                               required>
                    </div>

                    <!-- Remarks -->
                    <div class="mb-4">
                        <label class="form-label">Remarks</label>
                        <textarea class="form-control"
                                  name="remarks"
                                  rows="4"
                                  placeholder="Customer requirements / preferred car / budget"></textarea>
                    </div>

                    <!-- Buttons -->
                    <div class="d-flex justify-content-between">
                        <button type="submit" class="btn btn-custom text-white px-4">
                            <i class="bi bi-send-fill"></i> Submit Enquiry
                        </button>

                        <a href="/admin/dashboard" class="btn btn-outline-secondary px-4">
                            <i class="bi bi-x-circle"></i> Cancel
                        </a>
                    </div>

                </form>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
