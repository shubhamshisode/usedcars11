<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Delete Car Information</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* PAGE BACKGROUND : BLUE → GREEN */
        body {
            background: linear-gradient(135deg, #e3fdfd, #90dbf4, #38b2ac);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        /* CARD */
        .card {
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            background: #ffffff;
            border: none;
        }

        /* TITLE */
        h3 {
            color: #004d40;
            font-weight: 700;
        }

        /* LABELS */
        .form-label {
            font-weight: 600;
            color: #004d40;
        }

        /* INPUT */
        .form-control {
            background-color: #ffffff;
            border: 1px solid #4db6ac;
            color: #000000;
        }

        .form-control::placeholder {
            color: #666;
        }

        .form-control:focus {
            border-color: #26a69a;
            box-shadow: 0 0 0 0.2rem rgba(38,166,154,0.35);
        }

        /* DELETE BUTTON */
        .btn-delete {
            background: linear-gradient(135deg, #009688, #00796b);
            border: none;
            font-weight: 600;
            color: #ffffff;
        }

        .btn-delete:hover {
            background: linear-gradient(135deg, #00796b, #004d40);
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(0,150,136,0.6);
        }

        /* WARNING TEXT */
        .warning {
            color: #c62828;
            font-size: 14px;
            font-weight: 600;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card p-4 col-md-6 mx-auto">

        <h3 class="text-center mb-3">Delete Car Information</h3>
        <p class="text-center text-muted mb-4">
            Enter the <b>Car ID</b> to permanently delete the car record.
        </p>

        <form action="http://localhost:8082/delete" method="POST">

            <div class="mb-3">
                <label class="form-label">Car ID</label>
                <input type="number" class="form-control" name="carId"
                       placeholder="Enter Car ID to delete" required>
            </div>

            <div class="text-center mt-4">
                <button type="submit" class="btn btn-delete btn-lg px-5">
                    Delete Car
                </button>
            </div>

            <p class="text-center warning mt-3">
                ⚠ This action cannot be undone
            </p>

        </form>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
